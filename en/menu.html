    <script>
  function traductorUniversal() {
    // Buscamos absolutamente todo el texto de la página
    const todosLosElementos = document.querySelectorAll('h1, h2, h3, div, span, a, p, .ec-store__product-name, .product-details__product-title');
    
    todosLosElementos.forEach(el => {
      if (el.children.length === 0 && el.innerText.includes('|')) {
        const partes = el.innerText.split('|');
        if (partes[1]) {
          el.innerText = partes[1].trim(); // Deja solo el inglés
        }
      }
    });

    // --- ESTO ES LO QUE DEBES AGREGAR ---
    // Hace que la tienda aparezca suavemente después de traducir
    const tienda = document.querySelector('.ec-store');
    if(tienda) {
        tienda.classList.add('tienda-lista');
    }
  }

  // Se ejecuta cada 500ms
  setInterval(traductorUniversal, 500);
</script>
