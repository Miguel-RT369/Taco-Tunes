<script>
  function limpiezaTotalEspañol() {
    const clases = '.ec-store__product-name, .grid-product__title-inner, .grid-product__description, .product-details__product-title, .product-details__product-description, .ec-bag__product-name, .ec-summary__product-name, .ec-base-text';
    const elementos = document.querySelectorAll(clases);
    
    elementos.forEach(el => {
      if (el.innerText && el.innerText.includes('|')) {
        const partes = el.innerText.split('|');
        if (partes[0]) {
          if (el.children.length > 0) {
              el.innerHTML = partes[0].trim();
          } else {
              el.textContent = partes[0].trim();
          }
        }
      }
    });

    // --- REFUERZO DE VISIBILIDAD PARA MÓVILES ---
    // Buscamos cualquier contenedor posible de la tienda
    const tienda = document.querySelector('.ec-store, .ec-wid-wrapper, .ec-cart, .ec-bag');
    if(tienda) {
        tienda.classList.add('tienda-lista');
        // Esto es el "tiro de gracia" para que el iPhone no lo vea negro
        tienda.style.opacity = "1";
        tienda.style.visibility = "visible";
    }
  }

  // Lo corremos cada 300ms
  setInterval(limpiezaTotalEspañol, 300);
</script>
